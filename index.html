<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Courtfest — le basket qui rassemble la ville. Open runs, tournois 5×5, musique et culture, toute l'année. Un mouvement Alpha 6 Sports né à Dakar." />
    <link rel="canonical" href="https://courtfest.com/" />

    <!-- Open Graph / social share (crawlers read the static HTML, so these are intentionally static & generic to the CourtFest brand) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CourtFest" />
    <meta property="og:url" content="https://courtfest.com/" />
    <meta property="og:title" content="Courtfest — Le basket qui rassemble la ville." />
    <meta property="og:description" content="Open runs, tournois 5×5, musique et culture — toute l'année, dans toute la ville. Né à Dakar." />
    <meta property="og:image" content="https://courtfest.com/og-cover.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Courtfest — Le basket qui rassemble la ville." />
    <meta name="twitter:description" content="Open runs, tournois 5×5, musique et culture — toute l'année, dans toute la ville." />
    <meta name="twitter:image" content="https://courtfest.com/og-cover.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Courtfest landing redesign typefaces (Anton display + Archivo body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- Vol. 02 event rich snippet -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsEvent",
      "name": "Courtfest Vol. 02 — Dakar 2026",
      "sport": "Basketball",
      "startDate": "2026-08-22T15:00:00+00:00",
      "endDate": "2026-08-22T21:00:00+00:00",
      "eventStatus": "https://schema.org/EventScheduled",
      "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
      "location": {
        "@type": "Place",
        "name": "Djily Mbaye",
        "address": { "@type": "PostalAddress", "addressLocality": "Dakar", "addressCountry": "SN" }
      },
      "organizer": { "@type": "Organization", "name": "Alpha 6 Sports", "url": "https://courtfest.com" },
      "image": "https://courtfest.com/og-cover.jpg",
      "description": "Open runs 5×5, musique, streetwear, jeunesse — Courtfest Vol. 02 à Dakar.",
      "isAccessibleForFree": true
    }
    </script>
    <!-- Static fallback; BrandProvider updates this to "{City} CourtFest — …" once the active edition loads. -->
    <title>CourtFest — Basket · Culture</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
