name: Build & Deploy to GitHub Pages (courtfest.com)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Supabase anon key is a public/publishable key — safe to inline.
          VITE_SUPABASE_URL: https://rvgzydyrsnwcygfshryi.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2Z3p5ZHlyc253Y3lnZnNocnlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTkxNjYsImV4cCI6MjA5NjIzNTE2Nn0.whbH-QWm08vuA7FDZgj8sxQjJW5ov-EtzrBl36v3uLk

      - name: Custom domain + SPA fallback
        run: |
          echo "courtfest.com" > dist/CNAME
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
